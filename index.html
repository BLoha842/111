<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ege-Prosto</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a5f7a">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a5f7a 0%, #2c3e50 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .button {
            display: inline-block;
            background: white;
            color: #1a5f7a;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            width: 80%;
            margin: 0.5rem 0;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .button.secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .note {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐢</div>
        <h1>Ege-Prosto</h1>
        <p>Справочник по решению задания №6 ЕГЭ по информатике с модулем Turtle</p>
        
        <a href="https://sites.google.com/view/ege-6/%D0%B3%D0%BB%D0%B0%D0%B2%D0%BD%D0%B0%D1%8F-%D1%81%D1%82%D1%80%D0%B0%D0%BD%D0%B8%D1%86%D0%B0" 
           class="button" 
           target="_blank" 
           rel="noopener noreferrer">
            Открыть сайт
        </a>
        
        <button class="button secondary" onclick="copyLink()">
            Копировать ссылку
        </button>
        
        <p class="note">
            Сайт откроется в новом окне браузера<br>
            (Google Sites не разрешает встраивание)
        </p>
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText('https://sites.google.com/view/ege-6/главная-страница')
                .then(() => {
                    alert('Ссылка скопирована!');
                });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW error:', err));
            });
        }
    </script>
</body>
</html>
